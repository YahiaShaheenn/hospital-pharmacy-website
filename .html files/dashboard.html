<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../style and script files/dashboard.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=ADLaM Display">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

    <div class="welcome">

        <div class="intro">
            <h2 id="WelcMsg"></h2>
            <p>Here's a quick overview of your pharmacy's performance.</p>
        </div>

        <div class="today">
            <div class="tdyinfo">
                <span class="material-icons">calendar_month</span>
                <p id="date"></p>
            </div>
        </div>

    </div>


    <h2 class="sumtitle">Today's Summary</h2>

    <div class="summary">

        <div class="card">
            <div class="ts">
                <div class="sumRow">
                    <span class="material-icons">payments</span>
                    <h3>Total Sales</h3>
                </div>
                <p id="totalsales">0 EGP</p>
            </div>
        </div>

        <div class="card">
            <div class="tp">
                <div class="sumRow">
                    <span class="material-icons">trending_up</span>
                    <h3>Total Profit</h3>
                </div>
                <p id="totalprofit">0 EGP</p>
            </div>
        </div>

        <div class="card">
            <div class="em">
                <div class="sumRow">
                    <span class="material-icons">warning</span>
                    <h3>Expired Medicines</h3>
                </div>
                <p id="expmeds">0</p>
            </div>
        </div>

        <div class="card">
            <div class="ls">
                <div class="sumRow">
                    <span class="material-icons">inventory</span>
                    <h3>Low Stock Items</h3>
                </div>
                <p id="lowstock">0</p>
            </div>
        </div>

    </div>


    <div class="mostSold">

        <h2>Most Sold Medicines</h2>

        <div id="mostBox" class="topbox"></div>
        
    </div>


    <div class="employee-month-section" id="employeeMonthSection">

        <h2>Employee of the Month</h2>

        <div id="employeeMonthBox"></div>

    </div>

    
    <div class="alerts">

        <h2>Pharmacy Alerts</h2>

        <div class="alertsBox" id="boxALERTS"></div>

    </div>


    
    <script type="text/javascript" src="../style and script files/layout.js"></script>
    <script type="text/javascript" src="../style and script files/sales.js"></script>
    <script type="text/javascript" src="../style and script files/dashboard.js"></script>

</body>

</html>
