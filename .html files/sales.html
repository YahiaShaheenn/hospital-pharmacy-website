<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales</title>
    <link rel="stylesheet" href="../style and script files/sales.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=ADLaM Display">
</head>

<body>
    <script src="../style and script files/layout.js"></script>

    <div class="sales-container">
        <div class="left-panel">
            <h2 class="panel-title"><span class="material-icons">search</span> Search Medicine</h2>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search medicine..." onkeydown="if(event.key==='Enter') searchmed()">
                <button onclick="searchmed()">Search</button>
            </div>
            <div id="searchResults"></div>
        </div>
        <div class="right-panel">
            <div class="refund-header">
                <h2 class="panel-title" id="cart-title" style="display:none">
                    <span class="material-icons">shopping_cart</span> Cart
                </h2>
                <button class="refund-btn" onclick="openRefundModal()">↩ Refund</button>
            </div>
            <div id="cart"></div>
            <div id="payment-section">
                <h3>Payment Method</h3>
                <input type="radio" name="payment" value="Cash"> Cash
                <input type="radio" name="payment" value="Card"> Card
                <br>
                <button onclick="checkout()">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Receipt -->
    <div id="receipt-bg">
        <div id="receipt-popup">
            <div id="receipt-content"></div>
            <button onclick="closeReceipt()">Close</button>
        </div>
    </div>

    <!-- Alert -->
    <div id="alert-bg">
        <div id="alert-popup">
            <p id="alert-message"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

    <!-- Refund -->
    <div id="refund-bg">
        <div id="refund-popup">
            <div id="refund-sales-view">
                <h3>Select a Sale</h3>
                <div id="refund-sales-list"></div>
                <button onclick="closeRefundModal()">Cancel</button>
            </div>
            <div id="refund-items-view" style="display:none">
                <h3>Select Items to Refund</h3>
                <div id="refund-items-list"></div>
                <button id="refund-confirm-btn">Confirm Refund</button>
                <button onclick="openRefundModal()">Back</button>
            </div>
        </div>
    </div>

    <script src="../style and script files/sales.js"></script>
</body>

</html>
