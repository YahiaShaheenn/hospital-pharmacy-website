<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="../style and script files/inventory.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Search Area -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter Medicine Name">
        <button onclick="searchMedicine()">Search</button>
    </div>

    <!-- Details Card (Hidden by default) -->
    <div class="medicine-card" id="medicineCard">
        <h2 id="display-name">Medicine Name</h2>
        <!-- <p><strong>ID:</strong> <span id="display-id">---</span></p> -->
        <p><strong>Category:</strong> <span id="display-category">---</span></p>
        <p><strong>Expiry Date:</strong> <span id="display-expiry">---</span></p>
        <p><strong>Current Stock:</strong> <span class="stock-number" id="display-stock">0</span></p>

        <!-- Update Stock Area -->
        <div class="action-area">
            <input type="number" id="qtyInput" placeholder="Qty">
            <button class="add-btn" onclick="updateStock('add')">Load (+)</button>
            <button class="take-btn" onclick="updateStock('take')">Take (-)</button>
        </div>
    </div>

    <script type="text/javascript" src="../style and script files/layout.js"></script>
    <script type="text/javascript" src="../style and script files/sales.js"></script>
    <script type="text/javascript" src="../style and script files/inventory.js"></script>

</body>

</html>
