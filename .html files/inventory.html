<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="../style and script files/inventory.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=ADLaM Display">
</head>

<body>

    <main class="inventory_container">

    

        <section class="summary_cards">
            <div class="summary_card">
                <h3>Total Items</h3>
                <p id="total_items">0</p>
            </div>
            <div class="summary_card warning_card">
                <h3>Low Stock Items</h3>
                <p id="low_stock_count">0</p>
            </div>
            <div class="summary_card danger_card">
                <h3>Expired Items</h3>
                <p id="expired_count">0</p>
            </div>
        </section>

        <section class="search_filter_section">
            <div class="search_filter">
                <input type="text" id="searchInput" placeholder="Search medicine..." onkeydown="if(event.key==='Enter') searchMedicine()">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Antibiotics">Antibiotics</option>
                    <option value="Cold & Flu">Cold & Flu</option>
                    <option value="Diabetes">Diabetes</option>
                    <option value="Heart">Heart</option>
                    <option value="Stomach">Stomach</option>
                    <option value="Respiratory">Respiratory</option>
                    <option value="Supplies">Supplies</option>
                    <option value="Emergency">Emergency</option>
                    <option value="Vitamins">Vitamins</option>
                    <option value="Baby Care">Baby Care</option>
                </select>
                <button onclick="searchMedicine()">Search</button>
                <button onclick="resetSearch()">Reset</button>
            </div>
        </section>

        <section class="table_section">
            <table>
                <thead>
                    <tr>
                        <th>Medicine Name</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Min Stock</th>
                        <th>Expiry Date</th>
                        <th>Cost Price</th>
                        <th>Selling Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory_table_body"></tbody>
            </table>
        </section>

    </main>

    <!-- Edit Stock Modal -->
    <div id="edit_modal">
        <div id="edit_box">
            <h3>Update Stock</h3>
            <p id="edit_medicine_name"></p>
            <p>Current Stock: <span id="edit_current_stock"></span></p>
            <input type="number" id="edit_qty" placeholder="Enter quantity">
            <div class="edit_buttons">
                <button onclick="updateStock('add')">Add Stock ➕</button>
                <button class="remove_btn" onclick="updateStock('take')">Remove Stock ➖</button>
            </div>
            <button class="close_btn" onclick="closeEditModal()">Close</button>
        </div>
    </div>

    <script type="text/javascript" src="../style and script files/layout.js"></script>
    <script type="text/javascript" src="../style and script files/sales.js"></script>
    <script type="text/javascript" src="../style and script files/inventory.js"></script>

</body>
</html>
