<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="../style and script files/inventory.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=ADLaM Display">
</head>
<body>

    <!-- Dynamic Layout Header -->
    <script src="../style and script files/layout.js"></script>

    <main class="inventory_container">

        <!-- MAIN FUNC OF INVENTORY: REGISTER BOUGHT MEDS -->
        <section class="form_section">
            <h3 style="color: #2c3e50; border-bottom: 2px solid #409fa8; padding-bottom: 10px;">Log Bought Medicines (Main Inventory)</h3>
            <div class="new_med_grid" style="grid-template-columns: repeat(4, 1fr);">
                <div class="input_group">
                    <label>Medicine Name</label>
                    <input type="text" id="new_name" placeholder="Enter name">
                </div>
                <div class="input_group">
                    <label>Category</label>
                    <select id="new_category">
                        <option value="Pain Relief">Pain Relief</option>
                        <option value="Antibiotics">Antibiotics</option>
                        <option value="Cold & Flu">Cold & Flu</option>
                        <option value="Diabetes">Diabetes</option>
                        <option value="Heart">Heart</option>
                        <option value="Supplies">Supplies</option>
                    </select>
                </div>
                <div class="input_group">
                    <label>Quantity Bought</label>
                    <input type="number" id="new_stock" placeholder="0">
                </div>
                <div class="input_group">
                    <label>Expiry Date</label>
                    <input type="date" id="new_expiry">
                </div>
                <div class="input_group">
                    <label>Buying Price (EGP)</label>
                    <input type="number" id="new_cost" placeholder="0.00">
                </div>
                <div class="input_group">
                    <label>Selling Price (EGP)</label>
                    <input type="number" id="new_selling" placeholder="0.00">
                </div>
                
                <!-- THE ONLY EXTRA OPTION: Refundable or Not -->
                <div class="input_group">
                    <label>Refund Policy</label>
                    <select id="new_refundable">
                        <option value="Refundable">Yes (Refundable)</option>
                        <option value="Non-Refundable">No (Non-Refundable)</option>
                    </select>
                </div>

                <button class="add_new_btn" onclick="addNewMedicine()" style="grid-column: 1 / -1; margin-top: 15px;">Add to Inventory Stock</button>
            </div>
        </section>

        <!-- SUMMARY CARDS -->
        <section class="summary_cards">
            <div class="summary_card">
                <h3>Total Items</h3>
                <p id="total_items">0</p>
            </div>
            <div class="summary_card warning_card">
                <h3>Low Stock</h3>
                <p id="low_stock_count">0</p>
            </div>
            <div class="summary_card danger_card">
                <h3>Expired Items</h3>
                <p id="expired_count">0</p>
            </div>
        </section>

        <!-- SEARCH SECTION -->
        <section class="search_section">
            <div class="search_bar_group">
                <input type="text" id="searchInput" placeholder="Search medicine..." onkeyup="searchMedicine()">
                <button class="reset_btn" onclick="resetSearch()">Reset View</button>
            </div>
        </section>

        <!-- INVENTORY TABLE -->
        <section class="table_section">
            <table>
                <thead>
                    <tr>
                        <th>Medicine Name</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Expiry Date</th>
                        <th>Prices (Buy/Sell)</th>
                        <th>Refundable?</th> 
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory_table_body"></tbody>
            </table>
        </section>
    </main>

    <!-- REFILL MODAL -->
    <div id="edit_modal" class="modal_overlay">
        <div class="modal_content">
            <h3>Refill Stock</h3>
            <p><strong>Medicine:</strong> <span id="edit_medicine_name"></span></p>
            <label>Quantity to add:</label>
            <input type="number" id="edit_qty" placeholder="0">
            <div class="edit_buttons">
                <button class="add_btn" onclick="processTransaction()">Add to Stock ➕</button>
                <button class="cancel_btn" onclick="closeTransactionModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../style and script files/inventory.js"></script>
</body>
</html>
