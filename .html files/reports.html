<section class="filters_section">

       <h3>Filter Reports</h3>

    <div class="filters">

        <div class="filter_box">

            <label for="date_filter">Date</label>
            <input type="date" id="date_filter">

        </div>

        <div class="filter_box">

            <label for="medicine_filter">Medicine</label>
            <select id="medicine_filter">

                <option value="">All Medicines</option>

            </select>  
        </div>

        <div class="filter_box">

            <label for="seller_filter">Seller</label>
            <select id="seller_filter">

                <option value="">All Sellers</option>
                <option value="Yahia">Dr.Yahia</option>
                <option value="Amena">Dr.Amena</option>
                <option value="Maya">Dr.Maya</option>
                <option value="Lubna">Dr.Lubna</option>
                <option value="Mariam">Dr.Mariam</option>

            </select>

        </div>

        <button id="filter_button">Apply Filter</button>
        <button id="reset_button">Reset</button>

    </div>

</section>

<section class="table_section">

    <table>

        <thead>

            <tr>

                <th>Medicine Name</th>
                <th>Quantity Sold</th>
                <th>Date</th>
                <th>Unit Price</th>
                <th>Total Price</th>
                <th>Payment Method</th>
                <th>Seller</th>

            </tr>

        </thead>

        <tbody id="reports_table_body">

        </tbody>

    </table>
    

</section>

<section class="actions_section">

    <button id="print_button">Print Report</button>
    <button id="export_button">Export PDF</button>

</section>
