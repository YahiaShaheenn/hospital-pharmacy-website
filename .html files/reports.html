<section class="filters_section">

       <h3>Filter Reports</h3>

    <div class="filters">

        <div class="filter_box">

            <label for="date_filter">Date</label>
            <input type="date" id="date_filter">

        </div>

        <div class="filter_box">

            <label for="medicine_filter">Medicine</label>
            <input type="text" id="medicine_filter" placeholder="Search medicine">

        </div>

        <div class="filter_box">

            <label for="seller_filter">Seller</label>
            <select id="seller_filter">

                <option value="">All Sellers</option>
                <option value="Ahmed">Ahmed</option>
                <option value="Mona">Mona</option>
                <option value="Sara">Sara</option>

            </select>

        </div>

        <button id="filter_button">Apply Filter</button>
        <button id="reset_button">Reset</button>

    </div>

</section>

<section class="table_section">

    <table>

        <thead>

            <tr>

                <th>Medicine Name</th>
                <th>Quantity Sold</th>
                <th>Date</th>
                <th>Seller</th>
                <th>Revenue</th>

            </tr>

        </thead>

        <tbody id="reports_table_body">

        </tbody>

    </table>
    

</section>
